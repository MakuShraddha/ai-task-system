version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: ai_task_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_task_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ai_task_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/ai_task_db
      SECRET_KEY: change-this-in-production-use-long-random-string
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      UPLOAD_DIR: /app/uploads
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - faiss_data:/app

volumes:
  mysql_data:
  uploads_data:
  faiss_data:
